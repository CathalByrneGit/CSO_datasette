curated.db:
  pxstat_catalog:
    sql: |-
      select
        code  as key,
        title as title,
        null  as timestamp,
        title || ' ' || code as search_1
      from pxstat_catalog
    display: |-
      <div style="display:flex; align-items:baseline; gap:0.75rem; flex-wrap:wrap;">
        <code style="font-size:0.9rem; color:#555;">{{ key }}</code>
        <span>{{ title }}</span>
        <a href="/-/pxstat?code={{ key }}"
           style="margin-left:auto; white-space:nowrap; font-size:0.85rem;">
          Load this table &rarr;
        </a>
      </div>
